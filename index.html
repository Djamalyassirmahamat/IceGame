<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODE_ARENA | Multiplayer Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --accent: #00ff88; --panel: #161b22; }
        body { background: var(--bg); color: white; font-family: 'Consolas', monospace; overflow: hidden; }
        .screen { display: none; height: 100vh; }
        .screen.active { display: block; }
        .glass { background: var(--panel); border: 1px solid #30363d; border-radius: 8px; }
        #codeEditor { 
            width: 100%; height: 70vh; background: #000; color: var(--accent); 
            border: 1px solid #30363d; padding: 15px; font-size: 18px; outline: none; resize: none;
        }
        .timer-crit { color: #ff3131; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="mainMenu" class="screen active container mt-5">
        <h1 class="text-center text-success mb-5">CODE_ARENA <small class="text-white fs-6">v1.0</small></h1>
        <div class="row justify-content-center" id="challengeGrid"></div>
    </div>

    <div id="gameScreen" class="screen">
        <nav class="navbar navbar-dark bg-black border-bottom border-secondary p-3">
            <span id="gameTitle" class="navbar-brand text-success fw-bold">CHALLENGE_NAME</span>
            <div id="timer" class="h3 m-0">00:00</div>
            <button class="btn btn-success fw-bold" onclick="evaluateCode()">DEPLOY_CODE</button>
        </nav>

        <div class="container-fluid mt-3">
            <div class="row">
                <div class="col-md-4">
                    <div class="glass p-3 mb-3">
                        <h5 class="text-success">MISSION_LOG</h5>
                        <p id="missionDesc" class="text-secondary small"></p>
                    </div>
                    <div id="console" class="glass p-3 text-info small" style="height: 200px; overflow-y: auto;">
                        > Prêt pour compilation...
                    </div>
                </div>
                <div class="col-md-8">
                    <textarea id="codeEditor" spellcheck="false"></textarea>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
